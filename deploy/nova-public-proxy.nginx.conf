# Example public edge for nova.casa. Replace the TLS certificate directives
# with the tunnel provider's managed TLS configuration.
server {
    listen 443 ssl;
    server_name nova.casa;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = / {
        proxy_pass http://127.0.0.1:4317/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /api/public/ {
        proxy_pass http://127.0.0.1:4317;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /assets/ { proxy_pass http://127.0.0.1:4317; }
    location ^~ /avatars/ { proxy_pass http://127.0.0.1:4317; }

    location ^~ /admin { return 404; }
    location ^~ /api/ { return 404; }
    location / { return 404; }
}
